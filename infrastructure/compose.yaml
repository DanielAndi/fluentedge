name: fluentedge

services:
  localstack:
    image: localstack/localstack:3.8
    container_name: fluentedge-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-west-2
      AWS_DEFAULT_REGION: us-west-2
      DEBUG: 0
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - fluentedge

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: fluentedge-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - fluentedge

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: fluentedge-api
    ports:
      - "8000:8000"
    env_file:
      - path: ../.env
        required: false
    environment:
      STORAGE_BACKEND: s3
      AWS_REGION: us-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_ENDPOINT_URL: http://localstack:4566
      S3_UPLOAD_BUCKET: fluentedge-uploads
      S3_DATA_BUCKET: fluentedge-data
      S3_ARTIFACTS_BUCKET: fluentedge-artifacts
      MLFLOW_TRACKING_URI: http://mlflow:5000
      UPLOAD_RETENTION_HOURS: ${UPLOAD_RETENTION_HOURS:-24}
    depends_on:
      localstack:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    volumes:
      - mlflow_data:/mlflow:ro
      - ../artifacts:/app/artifacts:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - fluentedge

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: fluentedge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fluentedge

  grafana:
    image: grafana/grafana:11.3.0
    container_name: fluentedge-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fluentedge

volumes:
  localstack_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  fluentedge:
    name: fluentedge
