name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, and security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e .

      - name: Format check
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Unit tests (fixtures)
        run: |
          pytest tests/unit -v -m "not integration" \
            --junitxml=test-results/junit.xml \
            --cov=api --cov=ml \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            test-results/junit.xml
            coverage.xml
          if-no-files-found: warn

      - name: Dependency vulnerability scan
        run: pip-audit -r requirements-dev.lock | tee pip-audit-report.txt
        continue-on-error: true

      - name: Upload vulnerability scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.txt
          if-no-files-found: ignore

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-config:
    name: Compose config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate Compose configuration
        run: docker compose -f infrastructure/compose.yaml config
